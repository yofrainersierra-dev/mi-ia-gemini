<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA IA - CONEXIÓN FORZADA</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Consolas', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #screen { width: 90%; height: 400px; background: #000; border: 1px solid #333; overflow-y: auto; padding: 15px; margin-bottom: 10px; border-radius: 8px; box-shadow: inset 0 0 10px #00ff4133; }
        input { width: 85%; background: #111; border: 1px solid #00ff41; color: #00ff41; padding: 15px; font-size: 16px; outline: none; }
        .user { color: #00d4ff; margin-top: 10px; }
        .ia { color: #00ff41; margin-bottom: 10px; border-left: 2px solid #00ff41; padding-left: 10px; }
        .err { color: #ff3b3b; font-weight: bold; }
    </style>
</head>
<body>
    <h3>NÚCLEO IA: PROTOCOLO DE BÚSQUEDA DE MODELO</h3>
    <div id="screen"><div class="ia">IA >> Esperando comando... (Asegúrate de tener el CORS en ON)</div></div>
    <input type="text" id="in" placeholder="Escribe 'Hola' y pulsa Enter...">

    <script>
        // === PEGA TU CLAVE AQUÍ ===
        const API_KEY = 'AIzaSyCveeBCWUBrkP8f9Z3msMaFS-GFHdV6eiM'; 
        // ==========================

        const sc = document.getElementById('screen');
        const input = document.getElementById('in');

        input.addEventListener("keypress", async (e) => {
            if (e.key === "Enter" && input.value.trim()) {
                const prompt = input.value;
                input.value = "";
                sc.innerHTML += `<div class="user">TÚ >> ${prompt}</div>`;
                sc.scrollTop = sc.scrollHeight;

                // LISTA DE RUTAS A PROBAR (Google cambia esto según la cuenta)
                const rutas = [
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
                    `https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=${API_KEY}`,
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${API_KEY}`
                ];

                let exito = false;

                for (let url of rutas) {
                    if (exito) break;
                    try {
                        const res = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });

                        const data = await res.json();

                        if (data.candidates && data.candidates[0].content) {
                            sc.innerHTML += `<div class="ia">IA >> ${data.candidates[0].content.parts[0].text}</div>`;
                            exito = true;
                        }
                    } catch (err) {
                        console.log("Fallo en ruta: " + url);
                    }
                }

                if (!exito) {
                    sc.innerHTML += `<div class="err">IA >> ERROR CRÍTICO: Ningún modelo respondió. 1. Revisa tu internet. 2. Verifica que la extensión CORS esté activa para 'URLs de archivo'.</div>`;
                }
                sc.scrollTop = sc.scrollHeight;
            }
        });
    </script>
</body>
</html>
