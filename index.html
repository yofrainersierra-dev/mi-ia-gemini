<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA IA - NÚCLEO TOTAL 2026</title>
    <style>
        :root { --neon-g: #00ff41; --neon-b: #00d4ff; --dark: #050505; }
        body { background: var(--dark); color: white; font-family: 'Consolas', monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        #screen { 
            width: 95%; max-width: 800px; height: 50vh; background: #000; 
            border: 1px solid #333; overflow-y: auto; padding: 20px; 
            border-radius: 10px; box-shadow: inset 0 0 20px rgba(0, 255, 65, 0.1);
            margin-bottom: 20px;
        }

        .msg { margin-bottom: 15px; padding: 12px; border-radius: 6px; font-size: 14px; line-height: 1.4; animation: slide 0.2s ease-out; }
        @keyframes slide { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        
        .ia-msg { color: var(--neon-g); border-left: 3px solid var(--neon-g); background: rgba(0, 255, 65, 0.05); }
        .user-msg { color: var(--neon-b); border-right: 3px solid var(--neon-b); text-align: right; background: rgba(0, 212, 255, 0.05); }
        
        #input-container { width: 95%; max-width: 800px; display: flex; gap: 10px; }
        input { flex: 1; background: #111; border: 1px solid #333; color: var(--neon-g); padding: 15px; border-radius: 5px; outline: none; font-family: inherit; }
        input:focus { border-color: var(--neon-g); }
        button { background: var(--neon-g); color: black; border: none; padding: 15px 25px; cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.2s; }
        button:hover { background: white; box-shadow: 0 0 15px var(--neon-g); }
        
        .status { font-size: 10px; color: #555; margin-top: 5px; }
    </style>
</head>
<body>

    <h2 style="color: var(--neon-g); letter-spacing: 2px;">PROTOCOLO GEMINI ONLINE</h2>
    
    <div id="screen">
        <div class="msg ia-msg">SISTEMA: Conexión HTTPS desde GitHub detectada. Probando modelos 1.5-Flash y 8B. Escribe algo para iniciar.</div>
    </div>

    <div id="input-container">
        <input type="text" id="userInput" placeholder="Escribir comando..." autocomplete="off">
        <button onclick="enviar()">EJECUTAR</button>
    </div>
    <div class="status">Estado: Servidor GitHub Pages Operativo</div>

    <script>
        // ==========================================
        // CONFIGURACIÓN - PEGA TU CLAVE AQUÍ
        // ==========================================
        const API_KEY = 'AIzaSyCveeBCWUBrkP8f9Z3msMaFS-GFHdV6eiM'; 
        // ==========================================

        const screen = document.getElementById('screen');
        const input = document.getElementById('userInput');

        input.addEventListener("keypress", (e) => { if (e.key === "Enter") enviar(); });

        async function enviar() {
            const prompt = input.value.trim();
            if (!prompt) return;

            addMsg(prompt, 'user');
            input.value = "";
            const loadMsg = addMsg("Buscando ruta de acceso...", 'ia');

            // LISTA DE INTENTOS AUTOMÁTICOS (2026 Compatible)
            const modelos = [
                "v1beta/models/gemini-1.5-flash-8b",
                "v1beta/models/gemini-1.5-flash",
                "v1/models/gemini-1.5-flash",
                "v1/models/gemini-pro"
            ];

            let exito = false;

            for (const m of modelos) {
                if (exito) break;
                
                try {
                    const url = `https://generativelanguage.googleapis.com/${m}:generateContent?key=${API_KEY}`;
                    
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    });

                    const data = await response.json();

                    if (data.candidates && data.candidates[0].content) {
                        loadMsg.innerText = "IA (" + m.split('/').pop() + ") >> " + data.candidates[0].content.parts[0].text;
                        exito = true;
                    } else if (data.error) {
                        console.warn("Fallo en " + m + ": " + data.error.message);
                    }
                } catch (err) {
                    console.error("Error de red en " + m);
                }
            }

            if (!exito) {
                loadMsg.innerHTML = `<span style="color:red">ERROR CRÍTICO: Ninguna ruta de Google respondió (404/Not Found). <br><br> 1. Desactiva la extensión CORS (en GitHub no hace falta). <br> 2. Revisa que tu API KEY esté ACTIVA en AI Studio.</span>`;
            }
            
            screen.scrollTop = screen.scrollHeight;
        }

        function addMsg(txt, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}-msg`;
            div.innerText = (type === 'ia' ? "IA >> " : "TÚ >> ") + txt;
            screen.appendChild(div);
            screen.scrollTop = screen.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
